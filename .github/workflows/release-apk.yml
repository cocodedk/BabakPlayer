name: Build signed release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

env:
  KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and increment version
        id: version
        run: |
          CURRENT_VERSION=$(cat version.txt)
          echo "Current version: $CURRENT_VERSION"
          NEW_VERSION=$((CURRENT_VERSION + 1))
          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > version.txt
          echo "VERSION_NAME=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0
          if [ -z "$KEYSTORE_BASE64" ]; then echo "Missing or empty secret: KEYSTORE_BASE64"; missing=1; fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then echo "Missing or empty secret: KEYSTORE_PASSWORD"; missing=1; fi
          if [ -z "$KEY_ALIAS" ]; then echo "Missing or empty secret: KEY_ALIAS"; missing=1; fi
          if [ -z "$KEY_PASSWORD" ]; then echo "Missing or empty secret: KEY_PASSWORD"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-release-signed
          path: app/build/outputs/apk/release/app-release.apk

      - name: Copy APK with fixed name for stable download URL
        run: cp app/build/outputs/apk/release/app-release.apk BabakPlayer.apk

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: BabakPlayer.apk
          draft: false
          generate_release_notes: true
